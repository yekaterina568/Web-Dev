<section>
    <form>
      <input type="text" placeholder="Filter by city" (input)="filterResults($any($event.target).value)">
      <button type="button" (click)="filterResults($any($event).target.previousElementSibling.value)">Search</button>
    </form>
  </section>
  
  <section class="results">
    <app-housing-location
      *ngFor="let housingLocation of housingLocationList"
      [housingLocation]="housingLocation">
    </app-housing-location>
  </section>
